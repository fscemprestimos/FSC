<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Vendas Pro</title>
    <style>
        :root { --primary: #0033ff; --success: #28a745; --bg: #f8f9fa; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: #333; }
        header { background: var(--primary); color: white; padding: 1rem; text-align: center; }
        
        .container { display: grid; grid-template-columns: 1fr 350px; gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        
        /* Grid de Produtos */
        .vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; text-align: center; }
        .card img { max-width: 100%; height: 120px; object-fit: contain; }
        
        /* Carrinho e Pagamento */
        .sidebar { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; height: fit-content; }
        .metodo-pagamento { margin: 15px 0; padding: 10px; background: #eee; border-radius: 5px; }
        .metodo-pagamento label { display: block; margin: 8px 0; cursor: pointer; }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add { background: var(--primary); color: white; margin-top: 10px; }
        .btn-finalizar { background: var(--success); color: white; font-size: 1.1rem; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        /* Histórico */
        .historico { grid-column: 1 / -1; background: white; padding: 20px; border-radius: 8px; margin-top: 20px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; }
    </style>
</head>
<body>

<header><h1>Simulador de Vendas Varejo</h1></header>

<div class="container">
    <div class="vitrine" id="vitrine"></div>

    <div class="sidebar">
        <h3>Carrinho</h3>
        <div id="itens-carrinho"><p>Vazio</p></div>
        <hr>
        <h4>Pagamento</h4>
        <div class="metodo-pagamento">
            <label><input type="radio" name="pagamento" value="Pix" checked> Pix (5% OFF)</label>
            <label><input type="radio" name="pagamento" value="Cartão de Crédito"> Cartão de Crédito</label>
            <label><input type="radio" name="pagamento" value="Boleto"> Boleto Bancário</label>
        </div>
        <div style="font-size: 1.4rem; margin-bottom: 15px;">Total: <b>R$ <span id="total-venda">0,00</span></b></div>
        <button class="btn-finalizar" onclick="gravarVenda()">Confirmar Venda</button>
    </div>

    <div class="historico">
        <h3>Vendas Armazenadas (LocalStorage)</h3>
        <table id="tabela-vendas">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Produtos</th>
                    <th>Pagamento</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <button onclick="limparHistorico()" style="width: auto; background: #ff4444; color: white; margin-top: 10px; padding: 5px 10px;">Limpar Histórico</button>
    </div>
</div>

<script>
    const produtos = [
        { id: 1, nome: "Smart TV 50'", preco: 2500 },
        { id: 2, nome: "Smartphone G", preco: 1500 },
        { id: 3, nome: "Fone Air", preco: 200 },
        { id: 4, nome: "Notebook Pro", preco: 4500 }
    ];

    let carrinho = [];

    // Carregar produtos na tela
    function carregarProdutos() {
        const v = document.getElementById('vitrine');
        produtos.forEach(p => {
            v.innerHTML += `
                <div class="card">
                    <img src="https://via.placeholder.com/150?text=${p.nome}" alt="${p.nome}">
                    <h4>${p.nome}</h4>
                    <p>R$ ${p.preco.toFixed(2)}</p>
                    <button class="btn-add" onclick="add(${p.id})">Adicionar</button>
                </div>
            `;
        });
    }

    function add(id) {
        const p = produtos.find(item => item.id === id);
        carrinho.push(p);
        renderCarrinho();
    }

    function renderCarrinho() {
        const lista = document.getElementById('itens-carrinho');
        const totalTxt = document.getElementById('total-venda');
        let total = 0;
        
        lista.innerHTML = carrinho.map(i => `<div>${i.nome} - R$ ${i.preco.toFixed(2)}</div>`).join('') || "Vazio";
        carrinho.forEach(i => total += i.preco);
        totalTxt.innerText = total.toLocaleString('pt-BR', {minimumFractionDigits: 2});
    }

    // ARMAZENAMENTO
    function gravarVenda() {
        if (carrinho.length === 0) return alert("Carrinho vazio!");

        const total = document.getElementById('total-venda').innerText;
        const pagamento = document.querySelector('input[name="pagamento"]:checked').value;
        const data = new Date().toLocaleString('pt-BR');

        const novaVenda = {
            data: data,
            itens: carrinho.map(i => i.nome).join(', '),
            pagamento: pagamento,
            total: total
        };

        // Pegar o que já existe no LocalStorage ou criar array vazio
        const historico = JSON.parse(localStorage.getItem('vendas_simuladas')) || [];
        historico.push(novaVenda);
        
        // Salvar de volta
        localStorage.setItem('vendas_simuladas', JSON.stringify(historico));

        alert("Venda registrada com sucesso!");
        carrinho = [];
        renderCarrinho();
        exibirHistorico();
    }

    function exibirHistorico() {
        const historico = JSON.parse(localStorage.getItem('vendas_simuladas')) || [];
        const corpoTabela = document.querySelector('#tabela-vendas tbody');
        corpoTabela.innerHTML = historico.map(v => `
            <tr>
                <td>${v.data}</td>
                <td>${v.itens}</td>
                <td>${v.pagamento}</td>
                <td>R$ ${v.total}</td>
            </tr>
        `).reverse().join('');
    }

    function limparHistorico() {
        if(confirm("Deseja apagar todas as vendas salvas?")) {
            localStorage.removeItem('vendas_simuladas');
            exibirHistorico();
        }
    }

    // Inicialização
    carregarProdutos();
    exibirHistorico();
</script>
</body>
</html>
