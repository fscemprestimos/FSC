<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Empréstimo - FC</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #1c1e21; margin-bottom: 20px; }
        label { display: block; text-align: left; margin-bottom: 8px; color: #4b4f56; font-weight: 600; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #dddfe2; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background-color: #25d366; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #128c7e; }
        .footer { margin-top: 15px; font-size: 12px; color: #90949c; }
    </style>
</head>
<body>

<div class="card">
    <h2>Simulador FC</h2>
    
    <label for="valor">Quanto você precisa?</label>
    <input type="number" id="valor" placeholder="R$ 0,00" step="0.01">

    <button onclick="enviarSimulacao()">Simular e Chamar no Whats</button>
    
    <div class="footer">Taxa de juros: 40%</div>
</div>

<script>
    function enviarSimulacao() {
        const valorInput = document.getElementById('valor').value;
        const meuNumero = "55XXXXXXXXXXX"; // <--- COLOQUE SEU NÚMERO AQUI (Apenas números: 55 + DDD + Número)

        if (!valorInput || valorInput <= 0) {
            alert("Por favor, insira um valor para simular.");
            return;
        }

        const valorOriginal = parseFloat(valorInput);
        const juros = 0.40; // 40%
        const valorTotal = valorOriginal * (1 + juros);

        // Mensagem formatada para o WhatsApp
        const mensagem = `Olá! Vi seu site e gostaria de um empréstimo.%0A%0A` +
                         `*Valor solicitado:* R$ ${valorOriginal.toFixed(2)}%0A` +
                         `*Total com juros (40%):* R$ ${valorTotal.toFixed(2)}`;

        // URL da API oficial
        const url = `https://wa.me/${meuNumero}?text=${mensagem}`;

        // Abre em uma nova aba/janela
        window.open(url, '_blank');
    }
</script>

</body>
</html>
